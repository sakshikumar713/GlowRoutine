<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Dashboard</title>
    <style>
        /* CSS Reset and Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-success: #4ade80;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Dashboard Bento Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: var(--accent-primary);
        }

        /* Task List Styling */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .task-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
            border-left: 4px solid var(--accent-success);
        }

        .task-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Focus Timer Styling */
        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            font-family: monospace;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: var(--accent-primary);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Quick Add Form Styling */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--text-muted);
            background-color: transparent;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- Module 1: Routine Tracker -->
        <div class="card">
            <h2>☀️ Morning Focus</h2>
            <div class="task-list" id="taskList">
                <!-- JavaScript handles items dynamically -->
            </div>
        </div>

        <!-- Module 2: Focus Timer -->
        <div class="card">
            <h2>⌛ Focus Timer</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button onclick="toggleTimer()" id="startBtn">Start</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <!-- Module 3: Quick Add Task -->
        <div class="card">
            <h2>➕ Add Task</h2>
            <form class="input-group" onsubmit="addTask(event)">
                <input type="text" id="taskName" placeholder="Task Name (e.g., Read Books)" required>
                <input type="text" id="taskTime" placeholder="Time (e.g., 08:00 AM)" required>
                <button type="submit">Add to Timeline</button>
            </form>
        </div>
    </div>

    <script>
        // Initial Mock Database State
        let tasks = [
            { id: 1, title: "Hydrate", time: "07:00 AM", completed: true },
            { id: 2, title: "Stretch & Breathe", time: "07:05 AM", completed: false },
            { id: 3, title: "Review Tasks", time: "07:20 AM", completed: false }
        ];

        // 1. Task Logic Functions
        function renderTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = ''; // Clear current display
            
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;
                div.onclick = () => toggleTask(task.id);
                
                div.innerHTML = `
                    <span>${task.title}</span>
                    <span class="task-time">${task.time}</span>
                `;
                container.appendChild(div);
            });
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            renderTasks();
        }

        function addTask(event) {
            event.preventDefault();
            const nameInput = document.getElementById('taskName');
            const timeInput = document.getElementById('taskTime');

            const newTask = {
                id: Date.now(),
                title: nameInput.value,
                time: timeInput.value,
                completed: false
            };

            tasks.push(newTask);
            renderTasks();

            // Clear Form
            nameInput.value = '';
            timeInput.value = '';
        }

        // 2. Timer Logic Functions
        let timeLeft = 1500; // 25 minutes in seconds
        let timerInterval = null;

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const seconds = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${minutes}:${seconds}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = 'Start';
            } else {
                btn.innerText = 'Pause';
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        alert("Time up! Take a break.");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 1500;
            updateTimerDisplay();
            document.getElementById('startBtn').innerText = 'Start';
        }

        // Run on load
