<!DOCTYPE html>
<html>
<head>
    <title>My Routine & Skincare Helper</title>
</head>
<body>

    <!-- 1. The Main Heading -->
    <h1>Welcome to My Routine Helper</h1>
    <p>Fix your daily routine and get glowing skin!</p>

    <!-- 2. The Routine Checklist Section -->
    <h2>Today's Routine</h2>
    <ul>
        <li><input type="checkbox"> Drink a glass of water</li>
        <li><input type="checkbox"> Do 10 minutes of morning stretching</li>
        <li><input type="checkbox"> Study for school</li>
    </ul>

    <!-- 3. The Skincare Helper Chat Section -->
    <h2>Skincare Helper</h2>
    <div id="chat-box">
        <p><strong>Helper Bot:</strong> Welcome! What is your skin type?</p>
        <button>Oily</button>
        <button>Dry</button>
        <button>Normal</button>
    </div>

</body>
</html>
