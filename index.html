<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Routine & Skincare Helper</title>
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333333;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px 0;
            border-bottom: 1px solid #eeeeee;
            font-size: 18px;
        }

        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Style for the response message */
        .bot-response {
            background-color: #e8f4fd;
            padding: 12px;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>Routine App</h1>

    <div class="card">
        <h2>Today's Routine</h2>
        <ul>
            <li><input type="checkbox"> Drink a glass of water</li>
            <li><input type="checkbox"> 10 mins of morning stretching</li>
            <li><input type="checkbox"> Study for school</li>
        </ul>
    </div>

    <div class="card">
        <h2>Skincare Helper</h2>
        <p><strong>Helper Bot:</strong> Welcome! What is your skin type?</p>
        
        <!-- We gave this container an ID so JavaScript can find it -->
        <div id="button-container">
            <!-- onclick tells JavaScript to run our function when clicked -->
            <button onclick="getSkinTip('oily')">Oily</button>
            <button onclick="getSkinTip('dry')">Dry</button>
            <button onclick="getSkinTip('normal')">Normal</button>
        </div>

        <!-- This empty space will hold our bot's answer -->
        <div id="answer-space"></div>
    </div>

    <!-- JAVASCRIPT LOGIC START -->
    <script>
        function getSkinTip(skinType) {
            // Find the empty answer space on our page
            let answerSpace = document.getElementById("answer-space");
            let buttonContainer = document.getElementById("button-container");
            
            // Create a variable to hold our message text
            let tipMessage = "";

            // Use logic to check which button was pressed
            if (skinType === 'oily') {
                tipMessage = "🧼 Bot Tip: Use a gentle, foaming cleanser and look for oil-free, lightweight gel moisturizers!";
            } else if (skinType === 'dry') {
                tipMessage = "💧 Bot Tip: Skip harsh scrubs. Use a hydrating cream cleanser and a thick moisturizer to lock in moisture!";
            } else if (skinType === 'normal') {
                tipMessage = "✨ Bot Tip: Your skin is balanced! Stick to a simple routine: gentle wash, light moisturizer, and sunscreen.";
            }

            // Put the message into our website HTML
            answerSpace.innerHTML = "<div class='bot-response'>" + tipMessage + "</div>";
            
            // Hide the buttons after the user makes a choice
            buttonContainer.style.display = "none";
        }
    </script>
    <!-- JAVASCRIPT LOGIC END -->

</body>
</html>
