<!DOCTYPE html>
<html>
<head>
    <!-- This tag makes the website look great on a phone screen! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Routine & Skincare Helper</title>
    
    <style>
        /* CSS turns the page background into a soft, calming color */
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333333;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto; /* Centers the app on computer screens */
        }

        h1 {
            color: #2c3e50;
            text-align: center;
        }

        /* Styling the boxes containing our app features */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Styling the checklist items */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px 0;
            border-bottom: 1px solid #eeeeee;
            font-size: 18px;
        }

        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2); /* Makes the checkbox bigger on phone screens */
        }

        /* Styling the Chat Helper Buttons */
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
            margin-top: 10px;
        }

        /* Changes the button color when you hover or tap it */
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Routine App</h1>

    <!-- The Routine Section Box -->
    <div class="card">
        <h2>Today's Routine</h2>
        <ul>
            <li><input type="checkbox"> Drink a glass of water</li>
            <li><input type="checkbox"> 10 mins of morning stretching</li>
            <li><input type="checkbox"> Study for school</li>
        </ul>
    </div>

    <!-- The Skincare Helper Box -->
    <div class="card">
        <h2>Skincare Helper</h2>
        <p><strong>Helper Bot:</strong> Welcome! What is your skin type?</p>
        
        <!-- These are the buttons we will hook up to JavaScript next -->
        <button>Oily</button>
        <button>Dry</button>
        <button>Normal</button>
    </div>

</body>
</html>
